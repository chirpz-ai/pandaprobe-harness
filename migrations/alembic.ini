# Alembic configuration for the PandaProbe Harness storage layer.
#
# The database connection string is intentionally NOT hardcoded here. It is
# resolved at runtime inside env.py from the DATABASE_URL environment variable,
# falling back to the local development URI that matches docker-compose.yml.

[alembic]
# Migration scripts live directly inside this directory (flat layout).
script_location = .

# Make this directory importable so env.py and helpers resolve cleanly.
prepend_sys_path = .

# Where new revision files are written. %(here)s is the directory of this ini.
version_locations = %(here)s/versions

# Use OS-native path separators when joining version locations.
version_path_separator = os

# Timestamped, zero-padded revision filenames for a readable, ordered history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Keep timestamps in UTC for deterministic ordering across machines.
timezone = UTC

# Detect column type changes during autogenerate (explicit migrations still win).
truncate_slug_length = 40


# Logging configuration. Output goes to stderr so it never pollutes stdout
# consumed by downstream tooling.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
