# =============================================================================
# PandaProbe Harness - offline test sandbox.
#
# Runs the full pytest suite inside the sandbox image with the `pandaprobe`
# binary shimmed to the in-repo fake CLI (tests/bin/fake_pandaprobe) so the
# suite needs no network, no auth, and no live platform. Uses a DEDICATED
# named volume `harness-test-data`, fully separate from the dev volume
# `harness-data` declared in docker-compose.yml.
# =============================================================================

services:
  sandbox-test:
    container_name: pandaprobe-harness-sandbox-test
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    volumes:
      - harness-test-data:/harness
      - ./tests:/app/tests:ro
    environment:
      # Point the harness at the fake CLI binary; no real credentials needed.
      HARNESS_CLI_BINARY: /app/tests/bin/fake_pandaprobe
      HARNESS_ROOT: /harness
    working_dir: /app
    command: ["uv", "run", "--frozen", "pytest", "-q"]
    networks:
      - pandaprobe-test

networks:
  pandaprobe-test:
    driver: bridge

volumes:
  harness-test-data:
