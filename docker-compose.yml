# =============================================================================
# PandaProbe Harness - diagnostic sandbox runtime.
#
# Spins up the agent execution sandbox (Component 2) built from
# Dockerfile.sandbox. The /harness diagnostic filesystem (Component 3) lives in
# a Docker-managed NAMED volume so learned rules survive `make down`
# (wiped only with `make clean`).
#
# PandaProbe CLI credentials are env-var driven and can be supplied via a
# git-ignored `.env.development` file:
#   cp .env.example .env.development   # fill in PANDAPROBE_* values
#   make up
# =============================================================================

services:
  sandbox:
    container_name: pandaprobe-harness-sandbox
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    volumes:
      - harness-data:/harness
    env_file:
      - path: ./.env.development
        required: false
    environment:
      PANDAPROBE_API_KEY: ${PANDAPROBE_API_KEY:-}
      PANDAPROBE_PROJECT_NAME: ${PANDAPROBE_PROJECT_NAME:-}
      PANDAPROBE_ENDPOINT: ${PANDAPROBE_ENDPOINT:-}
      HARNESS_ROOT: /harness
    healthcheck:
      test: ["CMD-SHELL", "pandaprobe version >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Keep the sandbox alive so `make harness-shell` can attach to it.
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - pandaprobe

networks:
  pandaprobe:
    driver: bridge

# Named volume keyed to this compose project (pandaprobe-harness_harness-data).
volumes:
  harness-data:
