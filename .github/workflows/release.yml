name: Release

on:
  push:
    branches: [main]
    paths:
      - "src/pandaprobe_harness/_version.py"
  workflow_dispatch:
    inputs:
      dangerous-non-main-release:
        required: false
        type: boolean
        default: false
        description: "Release from a non-main branch (danger!)"

jobs:
  # ============================================================================
  # Gate: run the full CI suite before releasing
  # ============================================================================
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  # ============================================================================
  # Release: build, tag, publish to GitHub and PyPI
  # ============================================================================
  release:
    name: Release to PyPI
    needs: [ci]
    if: github.ref == 'refs/heads/main' || inputs.dangerous-non-main-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from _version.py
        id: version
        run: |
          VERSION=$(python -c "exec(open('src/pandaprobe_harness/_version.py').read()); print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if version already released
        id: tag-check
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.version.outputs.version }}$"; then
            echo "already_released=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} already exists"
          else
            echo "already_released=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.version }} does not exist — proceeding"
          fi

      - name: Abort if already released
        if: steps.tag-check.outputs.already_released == 'true' && !inputs.dangerous-non-main-release
        run: |
          echo "::error::Version ${{ steps.version.outputs.version }} already released. Bump the version in _version.py to release again."
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build package
        run: uv build

      - name: Verify package
        run: uv run twine check dist/*

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ steps.version.outputs.version }}
          name: "pandaprobe-harness v${{ steps.version.outputs.version }}"
          commit: ${{ github.sha }}
          draft: false
          generateReleaseNotes: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
