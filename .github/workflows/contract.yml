name: Contract

on:
  workflow_dispatch:
  schedule:
    # Weekly, Mondays 06:00 UTC.
    - cron: '0 6 * * 1'

jobs:
  contract:
    runs-on: ubuntu-latest
    env:
      PANDAPROBE_API_KEY: ${{ secrets.PANDAPROBE_API_KEY }}
    steps:
      # Forks and secret-less checkouts must skip cleanly instead of failing:
      # gate every subsequent step on the presence of the API key.
      - name: Check for credentials
        id: creds
        run: |
          if [ -n "$PANDAPROBE_API_KEY" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "PANDAPROBE_API_KEY secret is not set; skipping contract tests."
          fi

      - uses: actions/checkout@v4
        if: steps.creds.outputs.has_creds == 'true'

      - uses: astral-sh/setup-uv@v5
        if: steps.creds.outputs.has_creds == 'true'
        with:
          python-version: '3.13'

      - name: Sync dev environment
        if: steps.creds.outputs.has_creds == 'true'
        run: uv sync --group dev

      - name: Install PandaProbe CLI
        if: steps.creds.outputs.has_creds == 'true'
        run: curl -fsSL https://cli.pandaprobe.com/install.sh | sh -s -- --version v0.2.0

      - name: Run contract tests against the live CLI
        if: steps.creds.outputs.has_creds == 'true'
        env:
          PANDAPROBE_API_KEY: ${{ secrets.PANDAPROBE_API_KEY }}
          PANDAPROBE_CONTRACT_SESSION: ${{ secrets.PANDAPROBE_CONTRACT_SESSION }}
        run: PANDAPROBE_LIVE=1 uv run pytest tests/contract -q
