version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "deps(python)"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: "development"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "deps(ci)"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
