# =============================================================================
# Model registry — the single place the study's provider-routing constraints
# live. Keys are study model identifiers; values resolve to LiteLLM strings.
#
# ROUTING CONSTRAINTS (see docs/benchmark-study-brief.md §7):
#   * Vertex AI is primary (Gemini + Claude partner models) — ADC auth.
#   * OpenAI models go through OpenAI's own API (Vertex does not serve them).
#   * Claude models support BOTH backends, switchable per run via `--backend`,
#     `CLAUDE_BACKEND`, or the per-model `default_backend` below.
#
# `param_allowlist` gates which sampler params LiteLLM may forward: Claude 5 and
# GPT-5 reject temperature/top_p/top_k (400), so those keys omit them; Gemini
# accepts them. `price_per_mtok` is a FALLBACK only, used when
# litellm.completion_cost has no price for a model. Verify current model IDs and
# the Vertex partner-model form for Claude against the installed LiteLLM at run time.
# =============================================================================
models:

  gemini-3.1-flash-lite:
    provider_family: gemini
    litellm_model: "vertex_ai/gemini-3.1-flash-lite"
    param_allowlist: [temperature, top_p, max_tokens]
    price_per_mtok: {input: 0.25, output: 1.50}

  gemini-3.5-flash:
    provider_family: gemini
    litellm_model: "vertex_ai/gemini-3.5-flash"
    param_allowlist: [temperature, top_p, max_tokens]
    price_per_mtok: {input: 1.50, output: 9.0}

  gemini-3.1-pro:
    provider_family: gemini
    litellm_model: "vertex_ai/gemini-3.1-pro-preview"
    param_allowlist: [temperature, top_p, max_tokens]
    price_per_mtok: {input: 2.00, output: 12.0}

  gpt-5.4-mini:
    provider_family: openai
    litellm_model: "openai/gpt-5.4-mini"
    param_allowlist: [max_tokens]
    price_per_mtok: {input: 0.75, output: 4.50}

  gpt-5.4-nano:
    provider_family: openai
    litellm_model: "openai/gpt-5.4-nano"
    param_allowlist: [max_tokens]
    price_per_mtok: {input: 0.20, output: 1.25}

  gpt-5.6-luna:
    provider_family: openai
    litellm_model: "openai/gpt-5.6-luna"
    param_allowlist: [max_tokens]
    price_per_mtok: {input: 1.00, output: 6.00}

  claude-sonnet-5:
    provider_family: claude
    backends:
      anthropic: "anthropic/claude-sonnet-5"
      vertex_ai: "vertex_ai/claude-sonnet-5"
    default_backend: vertex_ai
    param_allowlist: [max_tokens]
    price_per_mtok: {input: 3.0, output: 15.0}

  claude-haiku-4-5:
    provider_family: claude
    backends:
      anthropic: "anthropic/claude-haiku-4-5"
      vertex_ai: "vertex_ai/claude-haiku-4-5"
    default_backend: vertex_ai
    param_allowlist: [max_tokens]
    price_per_mtok: {input: 1.0, output: 5.0}

  # Dry-run pseudo-model: no real API calls (the MockClient is used instead).
  mock:
    provider_family: mock
    litellm_model: "mock/mock"
    mock: true
    param_allowlist: [max_tokens]

# Named roles used by the runners.
roles:
  user_simulator: gemini-3.1-flash-lite   # tau2 user simulator: cheap, fixed across arms
  dry_run: mock
  smoke: gemini-3.1-flash-lite             # the cheap model used by `make smoke`
